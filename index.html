<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的全能工具站</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: #f0f2f5; }
        .header { background: #2c3e50; color: white; padding: 25px; text-align: center; border-bottom: 4px solid #3498db; }
        .nav { background: #34495e; padding: 15px; text-align: center; position: sticky; top: 0; z-index: 100; }
        .nav a { color: white; margin: 0 18px; text-decoration: none; font-size: 16px; font-weight: bold; transition: 0.3s; }
        .nav a:hover { color: #3498db; }
        .container { max-width: 1200px; margin: 30px auto; display: flex; flex-wrap: wrap; gap: 25px; padding: 0 20px; }
        .card { background: white; margin: 15px; padding: 25px; border-radius: 12px; width: 320px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); transition: 0.3s; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 6px 20px rgba(0,0,0,0.1); }
        .card h2 { color: #2c3e50; margin-top: 0; font-size: 20px; }
        .card p { color: #7f8c8d; font-size: 14px; }
        .tool-btn { display: inline-block; margin: 8px 5px; padding: 10px 18px; background: #3498db; color: white; text-decoration: none; border-radius: 6px; font-size: 14px; transition: 0.3s; }
        .tool-btn:hover { background: #2980b9; }
        .footer { text-align: center; padding: 20px; color: #7f8c8d; margin-top: 40px; }
    </style>
</head>
<body>

    <div class="footer">
        © 2026 我的工具站 - Powered by GitHub

</body>
</html>
